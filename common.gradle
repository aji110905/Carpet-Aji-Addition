apply plugin: 'fabric-loom'
apply plugin: 'com.replaymod.preprocess'

int mcVersion = 1

preprocess {
    mcVersion = vars.get()["MC"] as int
    tabIndentation = true
}

configurations {
    modRuntimeOnly.exclude group: 'net.fabricmc', module: 'fabric-loader'
}

repositories {
    mavenLocal()
    maven {
        name 'MasaMaven'
        url 'https://masa.dy.fi/maven'
    }
}

loom{
    accessWidenerPath = file("carpetajiaddition.accesswidener")
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings loom.layered() {
        officialMojangMappings()
    }
    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
    modImplementation("carpet:fabric-carpet:${project.carpet_core_version}")
    include(implementation 'org.yaml:snakeyaml:2.2')
}

String fullModVersion = project.mod_version

version = 'v' + fullModVersion
group = project.maven_group

processResources {
    inputs.property "version", project.version
    filesMatching("fabric.mod.json") {
        def valueMap = [
                "version": fullModVersion,
                "minecraft_version": project.minecraft_version,
                "loader_version": project.loader_version
        ]
        expand valueMap
    }
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

String jarName = project.archives_base_name + '-v' + project.mod_version + '-mc' + project.minecraft_version

jar {
    from("LICENSE") {
        rename { "${it}_${jarName}"}
    }
}

remapJar {
    archiveFileName = "${jarName}.jar"
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
}