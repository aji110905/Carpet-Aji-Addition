carpetajiaddition:
  carpet:
    category:
      CAA: CAA
      recipe: recipe
    rule:
      cactusWrench:
        desc: When the cactus is in the assistant position, the blocks released are
          in the opposite direction.
        name: Flip Cactus
      commandFollow:
        desc: You can use the/roll command.
        name: Follow command
      commandMods:
        desc: You can use the/ods command.
        name: Modlist command
      dragonBreathRecipe:
        desc: Added a reasonable formula for Longxi.
        name: Can synthesize dragon breath
      dragonEggRecipe:
        desc: Added a reasonable formula for dragon eggs.
        name: Can synthesize dragon eggs
      glowingHopperMinecart:
        desc: When the funnel mining car is locked, it will emit red light, and vice
          versa, white light.
        name: Luminous funnel mining car
      keepOpeningVault:
        desc: The same player can always open the same treasure trove.
        name: Endless Treasury
      lockAllHopper:
        desc: All funnels will be locked, regardless of whether they receive the redstone
          signal or not.
        name: Incompetent funnel
      lockAllHopperMinecart:
        desc: All funnel mining cars will be locked, regardless of whether there is
          a charged activation rail underneath.
        name: Incompetent funnel mining car
      safeMagmaBlock:
        desc: When you stand on a magma block, you will no longer lose blood.
        name: A non scalding magma block
      sitOnTheGround:
        desc: You can sit on the ground by squatting down multiple times.
        name: sit on the ground
      tameHorse:
        desc: You can tame a horse 100%.
        name: Obedient horse
      useMachineFlip:
        desc: When this rule is enabled, all languages except zh_cn will be translated
          using Baidu Translate, including this sentence; When this rule is closed,
          only zh_cn will be used.
        name: Using machine flipping
