      lockAllHopperMinecart:
        desc: Todos os carrinhos de funil serão bloqueados, independentemente de ele
          estar abaixo de uma trilha ativada ou não.
        name: Carro de mineração de funil incompetente
      safeMagmaBlock:
        desc: Quando você está em pé no bloco de magma, não sangra mais.
        name: Blocos de magma sem pés quentes
      sitOnTheGround:
        desc: Pode sentar-se no chão várias vezes.
        name: Sente-se.
      tameHorse:
        desc: Você pode domar o cavalo 100%.
        name: O cavalo obediente.
      useMachineFlip:
        desc: Quando esta regra estiver ativada, todos os idiomas exceto zh_cn serão
          traduzidos usando Baidu Translation, incluindo esta frase; Ao desativar
          esta regra, apenas zh_cn será usado.
